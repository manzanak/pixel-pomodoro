<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Plant Pomodoro</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfcf0; --card-bg: #ffffff; --shelf-color: #634335; --pot-color: #343b4e;
            --plant-green: #5b8a5b; --text-color: #2e2e2e; --accent: #d9ad5f; --border: #2e2e2e;
        }
        body.dark-mode {
            --bg-color: #1a1a1a; --card-bg: #242424; --shelf-color: #4a342c; --pot-color: #4a546d;
            --plant-green: #8ebf8e; --text-color: #e0e0e0; --accent: #f2c94c; --border: #000000;
        }
        body { background-color: transparent; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: 'VT323', monospace; overflow: hidden; }
        .container { background: var(--card-bg); border: 4px solid var(--border); width: 280px; padding: 20px; display: flex; flex-direction: column; align-items: center; box-shadow: 6px 6px 0px rgba(0,0,0,0.1); }
        .theme-toggle { align-self: flex-end; cursor: pointer; background: none; border: none; color: var(--text-color); font-size: 22px; padding: 0; margin-bottom: -15px; line-height: 1; }
        .status-text { font-size: 24px; color: var(--plant-green); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }
        .plant-box { font-size: 50px; height: 60px; display: flex; align-items: flex-end; margin: 10px 0; }
        #timer { font-size: 75px; line-height: 1; color: var(--text-color); margin-bottom: 15px; }
        .btn-group { display: flex; gap: 10px; width: 100%; }
        button.main-btn { flex: 1; font-family: 'VT323', monospace; font-size: 20px; padding: 5px; cursor: pointer; border: 3px solid var(--border); background: var(--pot-color); color: white; box-shadow: 3px 3px 0px rgba(0,0,0,0.1); }
        button.main-btn:active { box-shadow: none; transform: translate(2px, 2px); }
        .settings { width: 100%; margin-top: 15px; padding-top: 10px; border-top: 2px dashed var(--border); }
        .setting-input { display: flex; justify-content: space-between; align-items: center; font-size: 18px; margin-bottom: 5px; }
        input { width: 40px; font-family: 'VT323', monospace; border: 2px solid var(--border); background: var(--bg-color); color: var(--text-color); text-align: center; }
        .apply-btn { width: 100%; background: var(--accent); border: 2px solid var(--border); font-family: 'VT323', monospace; cursor: pointer; margin-top: 5px; }
        .shelf { width: 100%; height: 10px; background: var(--shelf-color); border: 2px solid var(--border); margin-top: 15px; }
    </style>
</head>
<body>
<div class="container">
    <button class="theme-toggle" id="themeToggle">🌙</button>
    <div class="status-text" id="status">WORK TIME</div>
    <div class="plant-box" id="plant">🌱</div>
    <div id="timer">25:00</div>
    <div class="btn-group">
        <button class="main-btn" id="startBtn">START</button>
        <button class="main-btn" id="resetBtn" style="background:#a94b44">RESET</button>
    </div>
    <div class="settings">
        <div class="setting-input"><span>WORK:</span><input type="number" id="workIn" value="25"></div>
        <div class="setting-input"><span>BREAK:</span><input type="number" id="breakIn" value="5"></div>
        <button class="apply-btn" id="applySettings">SAVE SETTINGS</button>
    </div>
    <div class="shelf"></div>
</div>

<script>
    let workMin = 25; let breakMin = 5; let timeLeft = workMin * 60; let timerId = null; let isWorking = true;
    const timerDisp = document.getElementById('timer');
    const statusDisp = document.getElementById('status');
    const plantDisp = document.getElementById('plant');
    const startBtn = document.getElementById('startBtn');
    const themeBtn = document.getElementById('themeToggle');

    // PERSISTENCE LOGIC
    function loadTheme() {
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
            document.body.classList.add('dark-mode');
            themeBtn.innerText = '☀️';
        }
    }

    themeBtn.addEventListener('click', function() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        this.innerText = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light'); // Save preference
    });

    function updateDisplay() {
        let m = Math.floor(timeLeft / 60); let s = timeLeft % 60;
        timerDisp.innerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        statusDisp.innerText = isWorking ? "WORK TIME" : "BREAK TIME";
        statusDisp.style.color = isWorking ? "var(--plant-green)" : "var(--accent)";
        if (isWorking) {
            let p = timeLeft / (workMin * 60);
            plantDisp.innerText = p > 0.6 ? "🌱" : p > 0.2 ? "🌿" : "🪴";
        } else { plantDisp.innerText = "✨🍄✨"; }
    }

    function toggleTimer() {
        if (timerId) { clearInterval(timerId); timerId = null; startBtn.innerText = "START"; }
        else {
            startBtn.innerText = "PAUSE";
            timerId = setInterval(() => {
                timeLeft--;
                if (timeLeft < 0) {
                    clearInterval(timerId); timerId = null; isWorking = !isWorking;
                    timeLeft = (isWorking ? workMin : breakMin) * 60;
                    updateDisplay();
                }
                updateDisplay();
            }, 1000);
        }
    }

    document.getElementById('applySettings').addEventListener('click', () => {
        workMin = parseInt(document.getElementById('workIn').value);
        breakMin = parseInt(document.getElementById('breakIn').value);
        reset();
    });

    function reset() { clearInterval(timerId); timerId = null; isWorking = true; timeLeft = workMin * 60; startBtn.innerText = "START"; updateDisplay(); }
    startBtn.addEventListener('click', toggleTimer);
    document.getElementById('resetBtn').addEventListener('click', reset);
    
    loadTheme(); // Run on startup
    updateDisplay();
</script>
</body>
</html>
