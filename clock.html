<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Shelf Clock</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfcf0;
            --card-bg: #ffffff;
            --shelf-color: #634335;
            --pot-color: #343b4e;
            --plant-green: #5b8a5b;
            --text-color: #2e2e2e;
            --accent: #d9ad5f;
            --border: #2e2e2e;
        }

        body.dark-mode {
            --bg-color: #1a1a1a;
            --card-bg: #242424;
            --shelf-color: #4a342c;
            --pot-color: #4a546d;
            --plant-green: #8ebf8e;
            --text-color: #e0e0e0;
            --accent: #f2c94c;
            --border: #000000;
        }

        body {
            background-color: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'VT323', monospace;
            overflow: hidden;
        }

        .container {
            background: var(--card-bg);
            border: 4px solid var(--border);
            width: 280px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.1);
        }

        .theme-toggle {
            align-self: flex-end;
            cursor: pointer;
            background: none;
            border: none; /* Border removed */
            color: var(--text-color);
            font-size: 22px;
            padding: 0;
            margin-bottom: 0px;
            line-height: 1;
        }

        .date-text {
            font-size: 24px;
            color: var(--plant-green);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .plant-box {
            font-size: 40px;
            height: 50px;
            display: flex;
            align-items: flex-end;
            margin: 5px 0;
        }

        #clock {
            font-size: 65px;
            line-height: 1;
            color: var(--text-color);
            margin: 10px 0;
        }

        #ampm {
            font-size: 24px;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .shelf {
            width: 100%;
            height: 10px;
            background: var(--shelf-color);
            border: 2px solid var(--border);
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <button class="theme-toggle" id="themeToggle">🌙</button>
    <div class="date-text" id="date">JAN 01</div>
    <div class="plant-box" id="plantIcon">🌿</div>
    <div id="clock">00:00:00</div>
    <div id="ampm">AM</div>
    <div class="shelf"></div>
</div>

<script>
    const clockDisp = document.getElementById('clock');
    const ampmDisp = document.getElementById('ampm');
    const dateDisp = document.getElementById('date');
    const plantIcon = document.getElementById('plantIcon');

    document.getElementById('themeToggle').addEventListener('click', function() {
        document.body.classList.toggle('dark-mode');
        this.innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    });

    function updateClock() {
        const now = new Date();
        let h = now.getHours(); let m = now.getMinutes(); let s = now.getSeconds();
        let ampm = h >= 12 ? 'PM' : 'AM';
        
        if (h >= 5 && h < 12) plantIcon.innerText = "🌱";
        else if (h >= 12 && h < 18) plantIcon.innerText = "🪴";
        else if (h >= 18 && h < 22) plantIcon.innerText = "🌿";
        else plantIcon.innerText = "🍄";

        h = h % 12; h = h ? h : 12;
        clockDisp.innerText = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        ampmDisp.innerText = ampm;
        const options = { month: 'short', day: '2-digit' };
        dateDisp.innerText = now.toLocaleDateString('en-US', options).toUpperCase();
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>
</body>
</html>
