<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Perspective</title>
    <style>
        :root {
            --bg-color: #f9f0f2; /* Light pink from screenshot */
            --text-color: #333333;
            --author-color: #555555;
            --underline-color: #d1d1d1;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #242424; 
                --text-color: #ffffff;
                --author-color: #cccccc;
                --underline-color: #555555;
            }
        }

        body { background-color: transparent; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .quote-box { background-color: var(--bg-color); border-radius: 20px; padding: 30px; width: 300px; box-sizing: border-box; text-align: left; }
        
        #quote-text {
            font-family: "Georgia", serif; font-size: 18px; line-height: 1.5; color: var(--text-color); margin: 0 0 15px 0; text-transform: lowercase; 
        }

        #quote-author {
            font-family: sans-serif; font-size: 13px; color: var(--author-color); margin: 0; text-transform: lowercase; letter-spacing: 0.5px; text-decoration: underline; text-underline-offset: 3px; text-decoration-color: var(--underline-color);
        }
    </style>
</head>
<body>
<div class="quote-box">
    <p id="quote-text"></p>
    <p id="quote-author"></p>
</div>

<script>
    const quotes = [
        { text: "Your silence will not protect you.", author: "audre lorde" },
        { text: "I am not a woman in terms of my voice. i am not a person. i am a place.", author: "clarice lispector" },
        { text: "Optimism is the faith that leads to achievement.", author: "helen keller" },
        { text: "No need to hurry. no need to sparkle. no need to be anybody but oneself.", author: "virginia woolf" },
        { text: "Confidence is quiet. insecurity is loud.", author: "bell hooks" }
    ];

    function getDailyQuote() {
        const now = new Date();
        const dateString = now.getFullYear() + "-" + now.getMonth() + "-" + now.getDate();
        let hash = 0;
        for (let i = 0; i < dateString.length; i++) { hash = dateString.charCodeAt(i) + ((hash << 5) - hash); }
        const index = Math.abs(hash) % quotes.length;
        const daily = quotes[index];
        document.getElementById('quote-text').innerText = `“${daily.text}”`;
        document.getElementById('quote-author').innerText = daily.author;
    }
    getDailyQuote();
</script>
</body>
</html>
